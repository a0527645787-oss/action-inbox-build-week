{% extends "base.html" %}{% block title %}{{ 'Edit' if resource else 'Add' }} resource · ActionInbox{% endblock %}{% block content %}<a class="back" href="/resources">← Business resources</a><section class="card email-card"><span class="eyebrow">Pasted text only</span><h1>{{ 'Edit business resource' if resource else 'Add business resource' }}</h1><form method="post" action="{{ '/resources/' ~ resource.id if resource else '/resources' }}"><p><label>Title<br><input name="title" maxlength="255" required value="{{ resource.title if resource else '' }}"></label></p><p><label>Resource type<br><select name="resource_type">{% for type in resource_types %}<option value="{{ type }}" {% if resource and resource.resource_type == type %}selected{% endif %}>{{ type|replace('_',' ')|title }}</option>{% endfor %}</select></label></p><p><label>Organization or team (optional)<br><input name="organization_team" maxlength="255" value="{{ resource.organization_team or '' if resource else '' }}"></label></p><p><label>Content<br><textarea name="content" maxlength="12000" rows="14" required>{{ resource.content if resource else '' }}</textarea></label></p><p><label><input type="checkbox" name="enabled" value="true" {% if not resource or resource.enabled %}checked{% endif %}> Enabled for analysis</label></p><button class="button" type="submit">Save resource</button></form></section>{% endblock %}
