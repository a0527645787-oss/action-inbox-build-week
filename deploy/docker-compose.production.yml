services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p\"$$MYSQL_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  actioninbox:
    build:
      context: ..
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:?MYSQL_USER is required}:${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}@mysql:3306/${MYSQL_DATABASE:?MYSQL_DATABASE is required}?charset=utf8mb4
      LOCAL_DEMO_AUTH_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:?GMAIL_CLIENT_ID is required}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:?GMAIL_CLIENT_SECRET is required}
      GMAIL_REDIRECT_URI: https://actioninbox.16-192-83-71.nip.io/auth/google/callback
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}
      MCP_ACCESS_TOKEN: ${MCP_ACCESS_TOKEN:?MCP_ACCESS_TOKEN is required}
      MCP_USER_ID: "00000000-0000-0000-0000-000000000001"
      REPOSITORY_ORIGIN: https://github.com/a0527645787-oss/action-inbox-build-week.git
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      actioninbox:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  backend:
    internal: true
  frontend:

volumes:
  mysql_data:
    name: actioninbox_mysql_data
