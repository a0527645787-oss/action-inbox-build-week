server {
    listen 80;
    server_name actioninbox.16-192-83-71.nip.io;

    return 301 https://actioninbox.16-192-83-71.nip.io$request_uri;
}

server {
    listen 443 ssl;
    server_name actioninbox.16-192-83-71.nip.io;

    ssl_certificate /etc/letsencrypt/live/actioninbox.16-192-83-71.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/actioninbox.16-192-83-71.nip.io/privkey.pem;
    ssl_session_cache shared:ActionInboxTLS:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 1m;

    location / {
        proxy_pass http://actioninbox:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
